<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#2e1065"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#glow)"/>
  <circle cx="200" cy="175" r="80" fill="none" stroke="url(#text)" stroke-width="1.5" opacity="0.4"/>
  <text x="200" y="200" font-family="Inter, sans-serif" font-size="72" font-weight="900" fill="url(#text)" text-anchor="middle" dominant-baseline="middle">AA</text>
  <text x="200" y="290" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="white" text-anchor="middle" opacity="0.5">Amitabh Anand</text>
  <text x="200" y="315" font-family="Inter, sans-serif" font-size="11" fill="#818cf8" text-anchor="middle" opacity="0.7">Software Engineer</text>
  <rect x="160" y="340" width="80" height="1" fill="url(#text)" opacity="0.3"/>
  <text x="200" y="370" font-family="Inter, sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.25">[ photo placeholder ]</text>
</svg>
