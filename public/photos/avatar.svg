<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="text3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg3)"/>
  <circle cx="150" cy="150" r="130" fill="url(#glow3)"/>
  <circle cx="150" cy="150" r="120" fill="none" stroke="url(#text3)" stroke-width="1" opacity="0.3"/>
  <!-- Simple avatar face -->
  <circle cx="150" cy="120" r="50" fill="#312e81" opacity="0.9"/>
  <ellipse cx="150" cy="230" rx="80" ry="55" fill="#312e81" opacity="0.7"/>
  <text x="150" y="128" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="url(#text3)" text-anchor="middle" dominant-baseline="middle">AA</text>
  <text x="150" y="278" font-family="Inter, sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.3">[ avatar ]</text>
</svg>
